<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images and Media</title>
</head>

<body>

    <!-- Lets discuss about <img> tag for image addition -->
    <h2>Image</h2>
    <img src="SUNSET.jpg" alt="Sunset Image" height="100" />
    <hr>
    <!-- images as a link -->
    <h2>Link Image</h2>
    <a href="https://www.google.com" title="Go to google" target="_blank">
        <img src="SUNSET.jpg" alt="sunset" width="200">
    </a>
    <hr>
    <!-- Using figure and figcaption -->
    <h2>Figure Images</h2>
    <figure>
        <img src="SUNSET.jpg" alt="sunset" height="50" />
        <figcaption>Beautiful Evening View</figcaption>
    </figure>
    <hr>

    <!-- Audio and Video -->
    <h2>Audio</h2>
    <audio controls>
        <source src="../Mera Rang De.mp3" type="audio/mp3" />
    </audio>
    <hr>
    <h2>Video</h2>

    <video width="200" controls>
        <source src="Video HTML.mkv" type="video/mp4" />
    </video>
</body>

</html>
