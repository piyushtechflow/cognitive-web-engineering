<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic List Builder</title>
    <link rel="stylesheet" href="dynamic-list.css">
</head>
<body>
    <main class="container">
        <header>
            <h2>My Dynamic List</h2>
        </header>
        <div class="input-zone">
            <h3>Input Zone:</h3>
            <input type="text" placeholder="Enter tasks upto 30 chars..." id="input-box" maxlength="30"/>
            <button id="add-task">+</button>
        </div>
        <div class="list-display">
            <h3>List Display:</h3>
        </div>
    </main>
    <script src="dynamic-list.js"></script>
</body>
</html>
