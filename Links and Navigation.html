<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link and Navigation</title>
</head>

<body>

    <!-- Anchor tag: Used to link another page or website or section. -->
    <!-- Add external site -->
    <a href="https://www.google.com" target="_blank" rel="noopener">Open Google</a>
    <br>
    <!-- Add internal link -->
    <a href="Basic Tags.html" target="_blank" rel="noopener">New Page</a>
    <br>

    <!-- Link to a section in the same page -->

    <!-- To learn more about this -->
    <a href="#contact">Contact</a>
    <section id="contact">
        <h3>Contact Me</h3>
        <p>Email: xyz@gmail.com</p>
    </section>

    <!-- Navigation Bar: <nav> used for navigation menu. -->

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="others.html">Others</a></li>
        </ul>
    </nav>

    <!-- Mail and Phone Links -->

    <a href="xyz123@gmail.com">Mail Me</a><br>
    <a href="tel: +911234567890">Call me</a><br>

    <!-- Attributes of Anchor tag: href, target, rel, title. -->
    <a href="https://youtube.com" target="_blank" rel="noopener" title="Visit youtube">YouTube</a>
    <hr>
    <!-- Real Usecase -->
    <header>
        <h1>My Portfolio</h1>
        <nav>
            <ul>
                <li> <a href="first.html">First Result</a></li>
                <li> <a href="Basic Tags.html">Basic Tags</a></li>
                <li> <a href="Images and Media.html">Images</a></li>
            </ul>
        </nav>
    </header>

</body>

</html>
