<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Number Guessing Game</title>
    <!-- Modern typography preset -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="main-container">
        <!-- Visual top glow decoration element -->
        <div class="glow-accent"></div>

        <div class="text-contents">
            <h2>Number Guessing Game</h2>
            <p id="rangeMsg">Range: 1-20</p>
        </div>

        <div class="input-area">
            <input type="number" placeholder="Enter the number..." id="input-number" min="1" autocomplete="off" />
        </div>

        <div class="btn-messages">
            <button type="submit" id="checkBtn">Check Answer</button>
            <p id="chanceMsg">Chances left: 5</p>
        </div>

        <div id="container"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
