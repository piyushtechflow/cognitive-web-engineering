<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Number Guessing Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: black;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-color: #f5f5f7;
        }

        .main-container {
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
            width: 440px;
            max-width: 90%;
            border-radius: 20px;
            background-color: #ffffff;
        }

        .text-contents {
            border: none;
        }

        .text-contents h2 {
            color: #1d1d1f;
            margin: 2px 4px;
            padding: 3px 6px;
        }

        .text-contents p {
            color: #1d1d1f;
            margin: 2px 4px;
            padding: 3px 6px;
        }

        #rangeMsg {
            color: #86868b;
        }

        .input-area {
            margin: 2px 4px;
            text-align: center;
        }

        #input-number {
            padding: 10px 20px;
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 20px;
        }

        #input-number:focus {
            border: 1px solid #0071e3;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
        }

        button {
            padding: 8px 16px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            background-color: #1d1d1f;
            color: white;
            font-weight: bold;
            border-radius: 20px;
        }

        #checkBtn:hover {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
            background-color: #0071e3;
            border: 1px solid rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
            transition: all .45s ease-in-out;
        }

        #checkBtn:focus {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
            background-color: #0071e3;
            border: 1px solid rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
            transition: all .45s ease-in-out;
        }
    </style>
</head>

<body>

    <div class="main-container">
        <div class="text-contents">
            <h2>Number Guessing Game</h2>
            <p>Guess the number and win prizes.</p>
            <p id="rangeMsg">The number range lies between 1-20...</p>
        </div>
        <div class="input-area">
            <input type="number" placeholder="Enter the number... " id="input-number">
            <button type="submit" onclick="checkResult()" id="checkBtn">Check</button>
            <p id="screenMsg">Let's begin the game...</p>
            <p id="chanceMsg">Chances left: 5</p>

        </div>
    </div>
    <script>

        let gameNum = Math.floor((Math.random() * 20) + 1);
        let defaultChances = 5;
        let hintMessage = document.getElementById("screenMsg");
        let chanceMessage = document.getElementById("chanceMsg");

        chanceMessage.style.color = 'blue';

        function updateUI(messageText, messageColor, currentChances) {
            hintMessage.innerHTML = messageText;
            hintMessage.style.color = messageColor;
            chanceMessage.innerHTML = `Chances Left : ${currentChances}`;
        }

        function checkResult() {


            if (defaultChances <= 0) {
                updateUI("Game is already over! Please refresh the page to play again.", '#ff3b30', defaultChances)
                return 0;
            }

            let rawInput = document.getElementById("input-number").value;

            if (rawInput.trim() === "") {
                updateUI("Please enter a number before checking.", '#ff3b30', defaultChances)
                return 0;
            }
            let userNumber = Number(rawInput);
            if (isNaN(userNumber)) {
                updateUI("Invalid input! Please enter a valid number.", '#ff3b30', defaultChances);
                return 0;
            }
            else if (userNumber > 20 || userNumber < 1) {
                updateUI("Input must be in range of 1-20.", '#ff3b30', defaultChances);
                return 0;
            }

            else if (userNumber === gameNum) {
                updateUI("Congratulations! You nailed it.", '#34c759', 0);
                setTimeout(() => {

                    if (confirm("Do you want to play again?")) {
                        location.reload();
                    }
                }, 1000)
                return 0;
            }
            defaultChances = defaultChances - 1;

            if (defaultChances === 0) {
                updateUI("You have no chances left! Game Over.", '#ff3b30', defaultChances);
                setTimeout(() => {

                    if (confirm("Do you want to play again?")) {
                        location.reload();
                    }
                }, 1000)
                return 0;
            }
            else if (userNumber > gameNum) {
                updateUI(`You entered ${userNumber} which is greater than the game number!`, '#ff9500', defaultChances);
            }
            else if (userNumber < gameNum) {
                updateUI(`You entered ${userNumber} which is lesser than the game number!`, '#ff9500', defaultChances);
            }
        }

    </script>
</body>

</html>
